name: Build and Deploy to Hostinger

# Push to main → build the static site → upload to Hostinger over FTP.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # allows manual "Run workflow" from the Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build # produces ./out

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # Direct origin server IP (the domain resolves to Hostinger's CDN,
          # which doesn't pass FTP through). From hPanel → FTP Accounts.
          server: 82.198.236.7
          port: 21
          protocol: ftps # explicit FTP over TLS (verified working)
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          # This FTP user is chrooted to public_html, so its login root IS the
          # web directory — deploy straight to "./".
          server-dir: ./
          # Action keeps a state file on the server so only changed files upload.
          exclude: |
            **/.git*
            **/.git*/**
