name: Build and Deploy to Hostinger

# Push to main → build the static site → rsync it to Hostinger over SSH.
# (Hostinger blocks FTP from cloud/CI IP ranges, so we deploy via SSH/rsync.)
on:
  push:
    branches: [main]
  workflow_dispatch: {} # allows manual "Run workflow" from the Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build # produces ./out

      - name: Deploy to Hostinger via SSH (rsync)
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: 82.198.236.7
          REMOTE_PORT: 65002
          REMOTE_USER: u128742652
          SOURCE: out/ # trailing slash → copy the *contents* of out/
          TARGET: /home/u128742652/domains/flatsix.media/public_html
          # Mirror the build output; --delete prunes stale files (e.g. old
          # hashed _next chunks). public_html holds only generated files.
          ARGS: "-rltgoDzvO --delete"
